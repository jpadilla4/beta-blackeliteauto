<!DOCTYPE html>
<html lang="es">

<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Detalles del Vehículo - Black Elite Auto</title>
       <link rel="icon"
              href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
       <link rel="stylesheet" href="css/styles.css">
       <style>
              .details-layout {
                     display: flex;
                     gap: 3rem;
                     margin-top: 2rem;
                     flex-wrap: wrap;
              }

              .images-section {
                     flex: 1;
                     min-width: 300px;
              }

              .main-image {
                     width: 100%;
                     height: 450px;
                     object-fit: cover;
                     border-radius: 8px;
                     margin-bottom: 1rem;
                     border: 1px solid var(--border-color);
              }

              .thumbnails {
                     display: flex;
                     gap: 1rem;
              }

              .thumbnails img {
                     width: 100px;
                     height: 80px;
                     object-fit: cover;
                     border-radius: 4px;
                     cursor: pointer;
                     border: 2px solid transparent;
                     transition: var(--transition);
              }

              .thumbnails img:hover,
              .thumbnails img.active {
                     border-color: var(--primary);
              }

              .info-section {
                     flex: 1;
                     min-width: 300px;
              }

              .price-tag {
                     font-size: 2.5rem;
                     color: var(--primary);
                     font-weight: 800;
                     margin: 1rem 0;
              }

              .specs-grid {
                     display: grid;
                     grid-template-columns: 1fr 1fr;
                     gap: 1rem;
                     margin: 2rem 0;
              }

              .spec-item {
                     background: var(--bg-card);
                     padding: 1rem;
                     border-radius: 4px;
                     border: 1px solid var(--border-color);
              }

              .spec-item span {
                     display: block;
                     color: var(--text-muted);
                     font-size: 0.9rem;
                     margin-bottom: 0.2rem;
              }

              .spec-item strong {
                     font-size: 1.1rem;
              }

              .calculator-box {
                     background: var(--bg-card);
                     padding: 2rem;
                     border-radius: 8px;
                     border: 1px solid var(--border-color);
                     margin-top: 2rem;
              }

              .calc-result {
                     background: rgba(212, 175, 55, 0.1);
                     padding: 1rem;
                     border: 1px solid var(--primary);
                     border-radius: 4px;
                     text-align: center;
                     margin-top: 1.5rem;
              }

              .calc-result div {
                     font-size: 2rem;
                     color: var(--primary);
                     font-weight: 800;
              }

              .related-section {
                     margin-top: 5rem;
                     border-top: 1px solid var(--border-color);
                     padding-top: 3rem;
              }

              .related-section h2 {
                     margin-bottom: 2rem;
              }
       </style>
</head>

<body>
       <nav class="navbar">
              <div style="display:flex; align-items:center;">
                     <a href="index.html" class="logo" style="color:var(--text-light);">Black Elite <span
                                   style="color:var(--primary);">Auto</span></a>
              </div>
              <div class="nav-links">
                     <span id="userNameDisplay"
                            style="display:none; color:var(--text-muted); font-size:1rem; margin-right: 1rem; border-right: 1px solid var(--border-color); padding-right: 1rem;"></span>
                     <a href="index.html">Inicio</a>
                     <a href="comparar.html" id="compareLink" style="display:none;">Comparar <span
                                   id="compareCount">(0)</span></a>
                     <a href="carrito.html" id="cartBtn" style="display:none;">Carrito <span
                                   id="cartCount">(0)</span></a>
                     <a href="login.html" class="btn btn-outline" id="loginBtn">Iniciar Sesión</a>
                     <a href="inventario.html" class="btn btn-outline" id="inventoryBtn"
                            style="display: none;">Panel</a>
                     <button id="logoutBtn" class="btn btn-primary" style="display: none;">Cerrar Sesión</button>
              </div>
       </nav>

       <div class="container">
              <!-- Botón Volver -->
              <a href="index.html"
                     style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); margin-bottom: 1rem; transition: color 0.3s;"
                     onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
                     &larr; Volver al inventario
              </a>

              <div class="details-layout" id="detailsContainer">
                     <!-- Contenido rellenado por JS -->
              </div>

              <!-- BOTONES DE COMPRA Y RESERVA (Oculto inicialmente, manejado por JS) -->
              <div id="actionButtonsContainer"
                     style="display: none; margin-top: 2rem; background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); text-align: center;">
                     <h3 style="margin-bottom: 1rem; color: var(--primary);">¿Interesado en este vehículo?</h3>
                     <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                            <button id="btnBuyNow" class="btn btn-primary"
                                   style="background: var(--accent); border: none; color: white; padding: 1rem 2rem; font-size: 1.1rem; flex: 1; max-width: 300px;">Comprar
                                   Directamente</button>
                            <button id="btnReserve" class="btn btn-outline"
                                   style="padding: 1rem 2rem; font-size: 1.1rem; flex: 1; max-width: 300px;">Reservar
                                   Vehículo</button>
                     </div>
              </div>

              <div class="calculator-box">
                     <h3 style="margin-bottom: 1.5rem; color: var(--primary);">Calculadora de Financiamiento</h3>
                     <form id="calcForm" class="filters-row" style="margin-top: 0;">
                            <div class="input-group" style="flex: 1;">
                                   <label>Banco a Financiar</label>
                                   <select id="calcBank" class="input-field">
                                          <option>Banco Popular</option>
                                          <option>Oriental Bank</option>
                                          <option>PENFED</option>
                                          <option>Cooperativas</option>
                                   </select>
                            </div>
                            <div class="input-group" style="flex: 1;">
                                   <label>Pronto Pago ($)</label>
                                   <input type="number" id="calcDown" class="input-field" value="0" min="0">
                            </div>
                            <div class="input-group" style="flex: 1;">
                                   <label>Plazo (Meses)</label>
                                   <select id="calcMonths" class="input-field">
                                          <option value="36">36 Meses</option>
                                          <option value="48">48 Meses</option>
                                          <option value="60" selected>60 Meses</option>
                                          <option value="72">72 Meses</option>
                                          <option value="84">84 Meses</option>
                                   </select>
                            </div>
                            <div class="input-group" style="flex: 1;">
                                   <label>Tasa de Interés (%)</label>
                                   <input type="number" id="calcAPR" class="input-field" value="5.9" step="0.1">
                            </div>
                     </form>
                     <button class="btn btn-outline" onclick="calculateLoan()"
                            style="width: 100%; margin-top: 1rem;">Calcular Pago Mensual</button>

                     <div class="calc-result" id="calcResultBox" style="display: none;">
                            <span>Tu Pago Estimado Mensual</span>
                            <div id="monthlyPayment">$0.00</div>
                     </div>
              </div>

              <section class="related-section">
                     <h2>Vehículos Recomendados</h2>
                     <div class="car-grid" id="relatedGrid">
                            <!-- Carros relacionados -->
                     </div>
              </section>
       </div>

       <div id="toastMessage" class="toast"></div>

       <script src="js/database.js"></script>
       <script src="js/details.js"></script>
</body>

</html>
