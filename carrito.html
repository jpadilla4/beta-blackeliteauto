<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Compra - Black Elite Auto</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cart-layout {
      display: flex;
      gap: 3rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .cart-items {
      flex: 2;
      min-width: 300px;
    }

    .cart-item {
      display: flex;
      gap: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .cart-item img {
      width: 150px;
      height: 100px;
      object-fit: cover;
      border-radius: 4px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-price {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 800;
    }

    .cart-summary {
      flex: 1;
      min-width: 300px;
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      height: fit-content;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .summary-total {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .success-box {
      display: none;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 4rem 2rem;
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div style="display:flex; align-items:center;">
      <a href="index.html" class="logo" style="color:var(--text-light);">Black Elite <span
          style="color:var(--primary);">Auto</span></a>
    </div>
    <div class="nav-links">
      <span id="userNameDisplay"
        style="display:none; color:var(--text-muted); font-size:1rem; margin-right: 1rem; border-right: 1px solid var(--border-color); padding-right: 1rem;"></span>
      <a href="index.html">Inicio</a>
      <a href="comparar.html" id="compareLink" style="display:none;">Comparar <span id="compareCount">(0)</span></a>
      <a href="carrito.html" id="cartBtn" style="display:none;">Carrito <span id="cartCount">(0)</span></a>
      <a href="login.html" class="btn btn-outline" id="loginBtn">Iniciar Sesión</a>
      <a href="inventario.html" class="btn btn-outline" id="inventoryBtn" style="display: none;">Panel</a>
      <button id="logoutBtn" class="btn btn-primary" style="display: none;">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Tu Carrito de
      Compra</h1>

    <div id="cartContent" class="cart-layout">
      <div class="cart-items" id="cartList">
        <!-- Listado dinámico -->
      </div>
      <div class="cart-summary">
        <h3 style="margin-bottom: 1.5rem;">Resumen de Orden</h3>
        <div id="summaryRows"></div>
        <div class="summary-row summary-total">
          <span>Total</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 2rem; font-size: 1.1rem; padding: 1rem;"
          onclick="processCheckout()">
          Finalizar Compra
        </button>
      </div>
    </div>

    <div class="success-box" id="successBox">
      <h2 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 1rem;">¡Solicitud Recibida!</h2>
      <p style="font-size: 1.2rem; color: var(--text-light);">
        Nos estaremos comunicando con usted en las próximas horas, o en los siguientes días.
      </p>
      <a href="index.html" class="btn btn-outline" style="margin-top: 2rem;">Volver al Inicio</a>
    </div>
  </div>

  <div id="toastMessage" class="toast"></div>

  <script src="js/database.js"></script>
  <script>
    let cartCars = [];
    document.addEventListener('DOMContentLoaded', async () => {
      await window.DB.init();
      const cartIds = JSON.parse(localStorage.getItem('userCart')) || [];

      if (cartIds.length === 0) {
        document.getElementById('cartContent').innerHTML = '<p style="color:var(--text-muted); font-size: 1.2rem;">Tu carrito está vacío.</p>';
        return;
      }

      const allCars = await window.DB.getAll('cars');
      cartCars = allCars.filter(c => cartIds.includes(c.id));
      renderCart();
    });

    function renderCart() {
      const listContainer = document.getElementById('cartList');
      const summaryRows = document.getElementById('summaryRows');

      listContainer.innerHTML = '';
      summaryRows.innerHTML = '';

      let total = 0;

      if (cartCars.length === 0) {
        document.getElementById('cartContent').innerHTML = '<p style="color:var(--text-muted); font-size: 1.2rem;">Tu carrito está vacío.</p>';
        return;
      }

      cartCars.forEach(car => {
        total += car.price;
        const fPrice = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(car.price);

        // Item List
        listContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${car.images[0]}" alt="Car">
                        <div class="cart-item-info">
                            <h3>${car.brand} ${car.model}</h3>
                            <span style="color: var(--text-muted);">Año: ${car.year} | Condición: ${car.condition}</span>
                            <div class="cart-item-price">${fPrice}</div>
                        </div>
                        <div>
                            <button class="btn" style="color: var(--accent); border: 1px solid var(--accent); padding: 0.5rem 1rem;" onclick="removeFromCart('${car.id}')">Quitar</button>
                        </div>
                    </div>
                `;

        // Summary
        summaryRows.innerHTML += `
                    <div class="summary-row" style="font-size: 0.95rem; color: var(--text-muted);">
                        <span>${car.brand} ${car.model}</span>
                        <span>${fPrice}</span>
                    </div>
                `;
      });

      document.getElementById('cartTotal').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(total);
    }

    function removeFromCart(id) {
      cartCars = cartCars.filter(c => c.id !== id);
      const newIds = cartCars.map(c => c.id);
      localStorage.setItem('userCart', JSON.stringify(newIds));
      renderCart();
      showToast('Vehículo removido del carrito');
    }

    async function processCheckout() {
      for (const car of cartCars) {
        car.status = 'pendiente';
        await window.DB.add('cars', car);
      }
      localStorage.removeItem('userCart');
      document.getElementById('cartContent').style.display = 'none';
      document.getElementById('successBox').style.display = 'block';
    }

    function showToast(msg) {
      const toast = document.getElementById('toastMessage');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
  <script>
    // Mostrar usuario
    document.addEventListener('DOMContentLoaded', () => {
      const userStr = localStorage.getItem('currentUser');
      if (userStr) {
        const currentUser = JSON.parse(userStr);
        const userDisplay = document.getElementById('userNameDisplay');
        if (userDisplay) {
          const roleName = currentUser.role === 'admin' ? 'Admin' : (currentUser.role === 'agent' ? 'Agente' : 'Cliente');
          userDisplay.innerText = `Hola, ${currentUser.name} (${roleName})`;
          userDisplay.style.display = 'inline-block';
        }
      }

      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('currentUser');
          window.location.href = 'login.html';
        });
      }
    });
  </script>
</body>

</html>
